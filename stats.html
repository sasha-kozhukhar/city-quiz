<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Статистика — Какой ты город?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --card: #fff;
      --accent: #c4621a;
      --accent-light: #f5e8de;
      --border: #e8e6e1;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    header {
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 18px; font-weight: 600; }

    header a {
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    header a:hover { text-decoration: underline; }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px 0;
    }

    /* ── Summary cards ── */

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .summary-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 20px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .summary-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 36px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -1px;
    }

    .summary-value.accent { color: var(--accent); }

    /* ── Live indicator ── */

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* ── Chart ── */

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .chart {
      background: var(--card);
      border-radius: var(--radius);
      padding: 8px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 40px;
    }

    .chart-row {
      display: grid;
      grid-template-columns: 160px 1fr 44px;
      align-items: center;
      gap: 12px;
      padding: 9px 20px;
    }

    .chart-row:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .chart-city {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-bar-wrap {
      height: 8px;
      background: var(--accent-light);
      border-radius: 4px;
      overflow: hidden;
    }

    .chart-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.6s ease;
      width: 0%;
    }

    .chart-count {
      font-size: 14px;
      font-weight: 600;
      text-align: right;
      color: var(--text);
    }

    /* ── Loading / error ── */

    .state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
      font-size: 15px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    img.emoji {
      height: 1.2em;
      width: 1.2em;
      vertical-align: -0.2em;
      display: inline;
    }

    /* ── Timeline chart ── */

    .timeline-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 20px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 40px;
    }

    .timeline-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .timeline-tab {
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .timeline-tab.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    @media (max-width: 600px) {
      header { padding: 16px; }
      main { padding: 24px 16px 0; }
      .summary { grid-template-columns: 1fr 1fr; }
      .chart-row { grid-template-columns: 130px 1fr 36px; padding: 8px 14px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🗺️ Статистика квиза</h1>
  <div style="display:flex;align-items:center;gap:20px;">
    <div class="live-badge"><div class="live-dot"></div><span id="last-updated">загружаем…</span></div>
    <a href="index.html">← Квиз</a>
  </div>
</header>

<main id="main">
  <div class="state" id="loading">
    <div class="spinner"></div>
    Загружаем данные…
  </div>
</main>

<script>
const GC    = 'https://city-quiz.goatcounter.com';
const TOKEN = 'dnvky82gxuv6hhrowg1n01wizw341h2d5u90b14e2szb3c1d';

const CITIES = {
  ВЕЛ: { name: 'Велигама',      flag: '🇱🇰' },
  СТА: { name: 'Стамбул',       flag: '🇹🇷' },
  ТБЛ: { name: 'Тбилиси',       flag: '🇬🇪' },
  БАТ: { name: 'Батуми',        flag: '🇬🇪' },
  ЕРВ: { name: 'Ереван',        flag: '🇦🇲' },
  МСК: { name: 'Москва',        flag: '🇷🇺' },
  БДВ: { name: 'Будва',         flag: '🇲🇪' },
  БЛГ: { name: 'Белград',       flag: '🇷🇸' },
  БШК: { name: 'Бишкек',        flag: '🇰🇬' },
  МДР: { name: 'Мадрид',        flag: '🇪🇸' },
  АГД: { name: 'Агадир',        flag: '🇲🇦' },
  БРЛ: { name: 'Берлин',        flag: '🇩🇪' },
  ЛДН: { name: 'Лондон',        flag: '🇬🇧' },
  КПТ: { name: 'Кейптаун',      flag: '🇿🇦' },
  ВНА: { name: 'Вена',          flag: '🇦🇹' },
  ЕГР: { name: 'Слонёнок Егор', flag: '🧸'  },
};

async function fetchCounter(path) {
  const encoded = path.startsWith('/')
    ? encodeURIComponent(path)
    : path.split('/').map(encodeURIComponent).join('/');
  try {
    const res = await fetch(`${GC}/counter/${encoded}.json`);
    if (!res.ok) return 0;
    const data = await res.json();
    return parseInt(data.count, 10) || 0;
  } catch { return 0; }
}

async function loadStats() {
  const cityKeys = Object.keys(CITIES);

  // All counters in one parallel batch — no auth headers, no CORS preflight
  const paths = [
    '/city-quiz',
    ...cityKeys.map(k => `result/${k}`)
  ];
  const counts = await Promise.all(paths.map(fetchCounter));

  const opened  = counts[0];
  const results = {};
  cityKeys.forEach((key, i) => { if (counts[1 + i] > 0) results[key] = counts[1 + i]; });

  return { opened, results };
}

const REFRESH_INTERVAL = 30; // seconds
let refreshTimer = null;
let countdownTimer = null;
let secondsLeft = REFRESH_INTERVAL;

function updateCountdown() {
  const el = document.getElementById('last-updated');
  if (!el) return;
  if (secondsLeft <= 0) {
    el.textContent = 'обновляем…';
  } else {
    el.textContent = `обновлено только что · следующее через ${secondsLeft} с`;
  }
}

function startCountdown() {
  clearInterval(countdownTimer);
  secondsLeft = REFRESH_INTERVAL;
  updateCountdown();
  countdownTimer = setInterval(() => {
    secondsLeft--;
    updateCountdown();
    if (secondsLeft <= 0) clearInterval(countdownTimer);
  }, 1000);
}

function renderInitial({ opened, results }) {
  const main = document.getElementById('main');

  const completions = Object.values(results).reduce((a, b) => a + b, 0);
  const base = Math.max(opened, completions, 1);
  const rate = Math.round((completions / base) * 100);

  const sorted = Object.entries(results).sort((a, b) => b[1] - a[1]);
  const maxCount = sorted.length > 0 ? sorted[0][1] : 1;

  main.innerHTML = `
    <div class="summary">
      <div class="summary-card">
        <div class="summary-label">Открыли квиз</div>
        <div class="summary-value" id="val-opened">${opened}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Прошли до конца</div>
        <div class="summary-value" id="val-completions">${completions}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Конверсия (открыли → прошли)</div>
        <div class="summary-value accent" id="val-rate">${rate}%</div>
      </div>
    </div>

    <div class="section-title" style="margin-bottom:16px;margin-top:40px;">График активности</div>
    <div class="timeline-card">
      <div class="timeline-tabs">
        <button class="timeline-tab active" data-range="30">30 дней</button>
        <button class="timeline-tab" data-range="7">7 дней</button>
        <button class="timeline-tab" data-range="all">Всё время</button>
      </div>
      <canvas id="timeline-canvas"></canvas>
      <div id="timeline-state" style="text-align:center;padding:32px;color:var(--muted);font-size:14px;display:none;"></div>
    </div>

    <div class="section-title">Результаты по городам</div>
    <div class="chart" id="chart"></div>
  `;

  const chart = document.getElementById('chart');

  if (sorted.length === 0) {
    chart.innerHTML = '<div class="state">Данных пока нет</div>';
    return;
  }

  sorted.forEach(([code, count]) => {
    const city = CITIES[code] || { name: code, flag: '🌍' };
    const pct = Math.round((count / maxCount) * 100);
    const row = document.createElement('div');
    row.className = 'chart-row';
    row.dataset.code = code;
    row.innerHTML = `
      <div class="chart-city">${city.flag} ${city.name}</div>
      <div class="chart-bar-wrap"><div class="chart-bar" data-pct="${pct}"></div></div>
      <div class="chart-count">${count}</div>
    `;
    chart.appendChild(row);
  });

  requestAnimationFrame(() => {
    document.querySelectorAll('.chart-bar').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  });
}

function renderUpdate({ opened, results }) {
  const completions = Object.values(results).reduce((a, b) => a + b, 0);
  const base = Math.max(opened, completions, 1);
  const rate = Math.round((completions / base) * 100);

  // Update summary numbers
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('val-opened', opened);
  set('val-completions', completions);
  set('val-rate', rate + '%');

  // Update chart
  const sorted = Object.entries(results).sort((a, b) => b[1] - a[1]);
  const maxCount = sorted.length > 0 ? sorted[0][1] : 1;
  const chart = document.getElementById('chart');
  if (!chart) return;

  // Check if city order changed — if so, re-render chart from scratch
  const existingCodes = [...chart.querySelectorAll('.chart-row')].map(r => r.dataset.code);
  const newCodes = sorted.map(([code]) => code);
  const orderChanged = JSON.stringify(existingCodes) !== JSON.stringify(newCodes);

  if (orderChanged) {
    chart.innerHTML = '';
    sorted.forEach(([code, count]) => {
      const city = CITIES[code] || { name: code, flag: '🌍' };
      const pct = Math.round((count / maxCount) * 100);
      const row = document.createElement('div');
      row.className = 'chart-row';
      row.dataset.code = code;
      row.innerHTML = `
        <div class="chart-city">${city.flag} ${city.name}</div>
        <div class="chart-bar-wrap"><div class="chart-bar" style="width:${pct}%"></div></div>
        <div class="chart-count">${count}</div>
      `;
      chart.appendChild(row);
    });
  } else {
    // Just update numbers and bar widths in place
    chart.querySelectorAll('.chart-row').forEach(row => {
      const code = row.dataset.code;
      const count = results[code] || 0;
      const pct = Math.round((count / maxCount) * 100);
      row.querySelector('.chart-count').textContent = count;
      row.querySelector('.chart-bar').style.width = pct + '%';
    });
  }
}

// ── Timeline chart ────────────────────────────────────

let timelineChart = null;
let currentRange = 30;

function daysAgoISO(n) {
  const d = new Date(Date.now() - n * 86400000);
  return d.toISOString().split('T')[0];
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function fillDays(start, end) {
  const days = [];
  for (let d = new Date(start + 'T00:00:00'); d <= new Date(end + 'T00:00:00'); d.setDate(d.getDate() + 1)) {
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

function fmtDay(iso) {
  const [, m, dd] = iso.split('-');
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return `${parseInt(dd)} ${months[parseInt(m) - 1]}`;
}

async function loadChartData(range) {
  const end       = todayISO();
  const counterLookback = Math.min(typeof range === 'number' ? range : 90, 90);
  const counterStart = daysAgoISO(counterLookback - 1);
  const apiStart  = range === 'all' ? '2020-01-01' : daysAgoISO(range - 1);
  const chartStart = range === 'all' ? apiStart : apiStart;

  const opensByDay = {};
  const doneByDay  = {};

  // 1. Historical data via GoatCounter API (daily=true)
  //    Try without auth first (works if public stats enabled, avoids CORS preflight)
  //    then retry with Bearer token as fallback
  const apiUrl = `${GC}/api/v0/stats/hits?start=${apiStart}&end=${end}&daily=true&limit=300`;
  for (const opts of [{}, { headers: { 'Authorization': `Bearer ${TOKEN}` } }]) {
    try {
      const res = await fetch(apiUrl, opts);
      console.log('Chart API', opts.headers ? '(auth)' : '(no auth)', res.status, res.headers.get('content-type'));
      if (!res.ok) continue;
      const body = await res.json();
      console.log('Chart API hits:', body.hits?.length, 'first:', JSON.stringify(body.hits?.[0])?.slice(0, 120));
      const { hits } = body;
      let found = false;
      (hits || []).forEach(h => {
        const p = h.path;
        const isOpen = p === '/city-quiz' || p === '/city-quiz/' || p === '/city-quiz/index.html';
        const isDone  = p.startsWith('result/');
        if (!isOpen && !isDone) return;
        found = true;
        (h.stats || []).forEach(s => {
          if (isOpen) opensByDay[s.day] = (opensByDay[s.day] || 0) + (s.count || 0);
          if (isDone)  doneByDay[s.day]  = (doneByDay[s.day]  || 0) + (s.count || 0);
        });
      });
      if (found) break; // got useful data, stop retrying
    } catch (e) { console.warn('Chart API error:', e.message); }
  }

  // 2. Per-day counters supplement/override recent data (reliable, works going forward)
  const recentDays = fillDays(counterStart, end);
  const counts = await Promise.all([
    ...recentDays.map(d => `open/${d}`),
    ...recentDays.map(d => `done/${d}`),
  ].map(fetchCounter));

  recentDays.forEach((d, i) => {
    const o = counts[i];
    const c = counts[recentDays.length + i];
    if (o > 0) opensByDay[d] = Math.max(opensByDay[d] || 0, o);
    if (c > 0) doneByDay[d]  = Math.max(doneByDay[d]  || 0, c);
  });

  // Build final series — skip leading zero-only days for 'all' view
  let days = fillDays(chartStart, end);
  if (range === 'all') {
    const firstNonZero = days.findIndex(d => (opensByDay[d] || 0) + (doneByDay[d] || 0) > 0);
    if (firstNonZero > 0) days = days.slice(firstNonZero);
  }

  return {
    labels:      days.map(fmtDay),
    opens:       days.map(d => opensByDay[d] || 0),
    completions: days.map(d => doneByDay[d]  || 0),
  };
}

function renderTimeline(data) {
  const canvas = document.getElementById('timeline-canvas');
  const stateEl = document.getElementById('timeline-state');
  if (!canvas) return;

  if (!data) {
    canvas.style.display = 'none';
    stateEl.style.display = 'block';
    stateEl.textContent = 'Не удалось загрузить данные графика';
    return;
  }

  const hasAny = data.opens.some(v => v > 0) || data.completions.some(v => v > 0);
  if (!hasAny) {
    canvas.style.display = 'none';
    stateEl.style.display = 'block';
    stateEl.textContent = 'Данных за этот период нет';
    return;
  }

  canvas.style.display = 'block';
  stateEl.style.display = 'none';

  if (timelineChart) {
    timelineChart.data.labels = data.labels;
    timelineChart.data.datasets[0].data = data.opens;
    timelineChart.data.datasets[1].data = data.completions;
    timelineChart.update('none');
    return;
  }

  timelineChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: data.labels,
      datasets: [
        {
          label: 'Открыли',
          data: data.opens,
          borderColor: '#c4621a',
          backgroundColor: 'rgba(196,98,26,0.07)',
          borderWidth: 2,
          pointRadius: 3,
          pointHoverRadius: 5,
          pointBackgroundColor: '#c4621a',
          tension: 0.35,
          fill: true,
        },
        {
          label: 'Прошли до конца',
          data: data.completions,
          borderColor: '#3a7d6e',
          backgroundColor: 'rgba(58,125,110,0.07)',
          borderWidth: 2,
          pointRadius: 3,
          pointHoverRadius: 5,
          pointBackgroundColor: '#3a7d6e',
          tension: 0.35,
          fill: true,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: {
            font: { family: "'Inter', system-ui, sans-serif", size: 13 },
            boxWidth: 12,
            padding: 16,
            color: '#1a1a1a',
          },
        },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#e8e6e1',
          borderWidth: 1,
          titleColor: '#1a1a1a',
          bodyColor: '#6b6b6b',
          padding: 12,
          boxPadding: 4,
        },
      },
      scales: {
        x: {
          grid: { color: '#f0ede8' },
          ticks: {
            font: { family: "'Inter', system-ui, sans-serif", size: 11 },
            color: '#6b6b6b',
            maxTicksLimit: 12,
            maxRotation: 0,
          },
        },
        y: {
          beginAtZero: true,
          grid: { color: '#f0ede8' },
          ticks: {
            font: { family: "'Inter', system-ui, sans-serif", size: 11 },
            color: '#6b6b6b',
            stepSize: 1,
            precision: 0,
          },
        },
      },
    },
  });
}

function initTimelineTabs() {
  document.addEventListener('click', e => {
    const tab = e.target.closest('.timeline-tab');
    if (!tab) return;
    document.querySelectorAll('.timeline-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentRange = tab.dataset.range === 'all' ? 'all' : parseInt(tab.dataset.range);
    loadChartData(currentRange).then(renderTimeline);
  });
}

let firstLoad = true;

function refresh() {
  document.getElementById('last-updated').textContent = 'обновляем…';
  loadStats()
    .then(data => {
      if (firstLoad) {
        renderInitial(data);
        initTimelineTabs();
        firstLoad = false;
        if (navigator.userAgent.includes('Windows') && window.twemoji) {
          twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
        }
      } else {
        renderUpdate(data);
      }
      // Refresh chart on every cycle
      loadChartData(currentRange).then(renderTimeline);
      startCountdown();
    })
    .catch(err => {
      if (firstLoad) {
        document.getElementById('main').innerHTML = `
          <div class="state">Не удалось загрузить данные.<br>${err.message}</div>
        `;
      }
      startCountdown();
    });
}

refresh();
refreshTimer = setInterval(refresh, REFRESH_INTERVAL * 1000);
</script>

</body>
</html>

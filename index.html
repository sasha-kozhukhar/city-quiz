<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Какой ты город?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://city-quiz.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app">

    <div id="screen-intro" class="screen active">
      <div class="intro-content">
        <div class="intro-emoji">🗺️</div>
        <h1>Какой ты город?</h1>
        <p class="intro-subtitle">11 вопросов — и мы скажем, на какой из 15 городов ты похож больше всего</p>
        <button class="btn-primary" id="btn-start">Начать</button>
      </div>
    </div>

    <div id="screen-quiz" class="screen">
      <div class="quiz-header">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="question-counter" id="question-counter"></div>
      </div>
      <div class="quiz-body">
        <p class="question-text" id="question-text"></p>
        <div class="options-list" id="options-list"></div>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div class="result-image-wrap" id="result-image-wrap">
        <img id="result-img" src="" alt="" onerror="this.style.display='none'">
        <div class="result-image-placeholder" id="result-placeholder"></div>
      </div>
      <div class="result-body">
        <div class="result-city-name" id="result-city-name"></div>
        <p class="result-description" id="result-description"></p>
        <button class="btn-secondary" id="btn-restart">Пройти ещё раз</button>
      </div>
    </div>

  </div>
  <script src="quiz.js"></script>
</body>
</html>
